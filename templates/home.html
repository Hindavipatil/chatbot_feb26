<!DOCTYPE html>
<html>
<head>
    <title>Chatboat</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #89f7fe, #66a6ff);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            background: white;
            width: 650px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            margin-top: 0;
            text-align: center;
            color: #333;
        }

        textarea {
            width: 100%;
            height: 220px;
            border-radius: 15px;
            border: 2px solid #66a6ff;
            padding: 15px;
            font-size: 16px;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: #007bff;
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.3);
        }

        .input-area {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
        }

        input[type="text"] {
            width: 75%;
            padding: 12px;
            border-radius: 25px;
            border: 2px solid #66a6ff;
            font-size: 16px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #007bff;
        }

        input[type="submit"] {
            width: 22%;
            border-radius: 25px;
            border: none;
            background: #66a6ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type="submit"]:hover {
            background: #007bff;
            transform: scale(1.05);
        }

        h2 {
            text-align: center;
            color: #444;
        }
    </style>

    <script>
        function sb() {
            let chatbox = document.getElementById("chatbox");
            chatbox.scrollTop = chatbox.scrollHeight;
        }
    </script>

</head>

<body onload="sb()">

    <div class="chat-container">
        <h1>Chatboat</h1>

        <form method="POST">
            <textarea rows="7" cols="70" name="chat" id="chatbox">{{chat}}</textarea>

            <div class="input-area">
                <input type="text" name="qts" placeholder="Enter your question..." required>
                <input type="submit" value="Send">
            </div>
        </form>

        <h2>{{msg}}</h2>
    </div>

</body>
</html>
